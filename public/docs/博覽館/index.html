<script>
document.addEventListener('DOMContentLoaded', function() {
  
  const modeBtns = document.querySelectorAll('.mode-btn');
  const switcher = document.querySelector('.reading-mode-switcher');
  
  if (!modeBtns.length || !switcher) return;
  
  
  const savedMode = localStorage.getItem('preferredReadingMode') || 'medium';
  
  
  document.body.classList.add(`reading-mode-${savedMode}`);
  
  
  modeBtns.forEach(btn => {
    if (btn.dataset.mode === savedMode) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
    
    
    btn.addEventListener('click', function() {
      const mode = this.dataset.mode;
      
      
      document.body.classList.remove('reading-mode-narrow', 'reading-mode-medium', 'reading-mode-wide');
      
      
      document.body.classList.add(`reading-mode-${mode}`);
      
      
      modeBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      
      
      localStorage.setItem('preferredReadingMode', mode);
      
      console.log(`閱讀模式切換為：${mode}`); 
    });
  });
});
</script>

<script>
(function() {
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAll);
  } else {
    initAll();
  }
  
  function initAll() {
    initReadingSettings();
    initPhotoSwipe();
    initReadingProgress();
    initReadingPosition();
    calculateReadingTime();
    initQuickNav();  
    generateTOC();   
  }
  
  
  function initReadingSettings() {
    
    const modeBtns = document.querySelectorAll('.mode-btn');
    const savedMode = localStorage.getItem('preferredReadingMode') || 'medium';
    
    document.body.classList.add(`reading-mode-${savedMode}`);
    
    modeBtns.forEach(btn => {
      if (btn.dataset.mode === savedMode) {
        btn.classList.add('active');
      }
      
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const mode = this.dataset.mode;
        
        document.body.classList.remove('reading-mode-narrow', 'reading-mode-medium', 'reading-mode-wide');
        document.body.classList.add(`reading-mode-${mode}`);
        
        modeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        localStorage.setItem('preferredReadingMode', mode);
      });
    });
    
    
    const fontBtns = document.querySelectorAll('.font-btn');
    const savedFontSize = localStorage.getItem('preferredFontSize') || 'medium';
    
    document.body.classList.add(`font-size-${savedFontSize}`);
    
    fontBtns.forEach(btn => {
      if (btn.dataset.size === savedFontSize) {
        btn.classList.add('active');
      }
      
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const size = this.dataset.size;
        
        document.body.classList.remove('font-size-small', 'font-size-medium', 'font-size-large');
        document.body.classList.add(`font-size-${size}`);
        
        fontBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        localStorage.setItem('preferredFontSize', size);
      });
    });

    
    const trigger = document.querySelector('.settings-trigger');
    if (trigger) {
      trigger.addEventListener('click', function(e) {
        if (e.target.classList.contains('mode-btn') || e.target.classList.contains('font-btn')) {
          return;
        }
        this.classList.toggle('active');
      });
      
      document.addEventListener('click', function(e) {
        if (trigger && !trigger.contains(e.target)) {
          trigger.classList.remove('active');
        }
      });
      
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && trigger.classList.contains('active')) {
          trigger.classList.remove('active');
        }
      });
    }

    
    if (CSS && CSS.supports && CSS.supports('padding: env(safe-area-inset-left)')) {
      document.body.classList.add('supports-safe-area');
    }
  }
  
  
  function initReadingProgress() {
    const progressBar = document.querySelector('.reading-progress-bar');
    if (!progressBar) return;
    
    function updateProgress() {
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight - windowHeight;
      const scrollTop = window.scrollY;
      const progress = (scrollTop / documentHeight) * 100;
      progressBar.style.width = progress + '%';
    }
    
    window.addEventListener('scroll', updateProgress);
    window.addEventListener('resize', updateProgress);
    updateProgress();
  }
  
  
  function initReadingPosition() {
    const article = document.querySelector('article');
    if (!article) return;
    
    const articleId = article.id || window.location.pathname;
    const savedPosition = localStorage.getItem(`reading-position-${articleId}`);
    
    setTimeout(() => {
      if (savedPosition && parseInt(savedPosition) > 100) {
        const showRestoreDialog = confirm('偵測到您上次讀到這裡，要跳轉到上次的閱讀位置嗎？');
        if (showRestoreDialog) {
          window.scrollTo({
            top: parseInt(savedPosition),
            behavior: 'smooth'
          });
        }
      }
    }, 500);
    
    let saveTimeout;
    window.addEventListener('scroll', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        const scrollTop = window.scrollY;
        localStorage.setItem(`reading-position-${articleId}`, scrollTop);
      }, 2000);
    });
  }
  
  
  function calculateReadingTime() {
    const article = document.querySelector('article');
    if (!article) return;
    
    const text = article.textContent || article.innerText;
    const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
    const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
    const totalWords = chineseChars + englishWords;
    
    const wordsPerMinute = 300;
    const minutes = Math.ceil(totalWords / wordsPerMinute);
    
    const estimateElement = document.querySelector('.estimate-text');
    if (estimateElement) {
      if (minutes < 1) {
        estimateElement.textContent = '<1m';
      } else if (minutes < 60) {
        estimateElement.textContent = `${minutes} min`;
      } else {
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;
        if (remainingMinutes === 0) {
          estimateElement.textContent = `${hours}h`;
        } else {
          estimateElement.textContent = `${hours}h${remainingMinutes}m`;
        }
      }
    }
    
    const timeContainer = document.querySelector('.reading-time-on-progress');
    if (timeContainer) {
      if (minutes < 1) {
        timeContainer.title = '閱讀時間：少於 1 分鐘';
      } else if (minutes < 60) {
        timeContainer.title = `閱讀時間：約 ${minutes} 分鐘`;
      } else {
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;
        timeContainer.title = `閱讀時間：約 ${hours} 小時 ${remainingMinutes} 分鐘`;
      }
    }
  }
  
  
  window.addBookmark = function() {
    const selection = window.getSelection();
    const text = selection.toString().trim();
    
    if (text) {
      saveBookmark(text, `標記 "${text.substring(0, 20)}..."`, window.scrollY);
      showBookmarkNotification('📌 書籤已添加');
    } else {
      saveBookmark('', `位置 ${Math.round(window.scrollY / 100)}`, window.scrollY);
      showBookmarkNotification('🔖 閱讀位置已保存');
    }
  };
  
  function saveBookmark(text, name, position) {
    const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    const article = document.querySelector('article');
    const articleTitle = document.querySelector('h1')?.textContent || '未命名文章';
    
    bookmarks.push({
      id: Date.now(),
      text: text.substring(0, 50) + (text.length > 50 ? '...' : ''),
      name: name || `標記 ${bookmarks.length + 1}`,
      position: position,
      url: window.location.pathname,
      articleTitle: articleTitle,
      date: new Date().toLocaleString()
    });
    
    localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  }
  
  function showBookmarkNotification(message) {
    const notification = document.createElement('div');
    notification.textContent = message;
    notification.className = 'bookmark-notification';
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.remove();
    }, 2000);
  }
  
  
  function initQuickNav() {
    const nav = document.createElement('div');
    nav.className = 'quick-nav';
    nav.innerHTML = `
      <button class="nav-btn" id="goToTop" title="回到頂部">⬆️</button>
      <button class="nav-btn" id="goToBottom" title="跳到底部">⬇️</button>
    `;
    document.body.appendChild(nav);
    
    const topBtn = document.getElementById('goToTop');
    const bottomBtn = document.getElementById('goToBottom');
    
    topBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    
    bottomBtn.addEventListener('click', () => {
      window.scrollTo({ 
        top: document.documentElement.scrollHeight, 
        behavior: 'smooth' 
      });
    });
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 200) {
        topBtn.classList.remove('hidden');
      } else {
        topBtn.classList.add('hidden');
      }
    });
  }
  
  
  function generateTOC() {
    const article = document.querySelector('article');
    if (!article) return;
    
    const headings = article.querySelectorAll('h1, h2, h3, h4, h5, h6');
    if (headings.length === 0) return;
    
    const sidebar = document.createElement('div');
    sidebar.className = 'sidebar-toc';
    sidebar.innerHTML = '<div class="toc-title">章節目錄</div><ul class="toc-list"></ul>';
    
    const tocList = sidebar.querySelector('.toc-list');
    
    headings.forEach((heading, index) => {
      if (!heading.id) {
        heading.id = `heading-${index}`;
      }
      
      const level = parseInt(heading.tagName[1]);
      const li = document.createElement('li');
      li.className = `level-${level}`;
      
      const a = document.createElement('a');
      a.href = `#${heading.id}`;
      a.textContent = heading.textContent;
      
      a.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById(heading.id).scrollIntoView({
          behavior: 'smooth'
        });
      });
      
      li.appendChild(a);
      tocList.appendChild(li);
    });
    
    document.body.appendChild(sidebar);
    
    const toggleBtn = document.createElement('div');
    toggleBtn.className = 'toc-toggle';
    toggleBtn.innerHTML = '📚';
    toggleBtn.addEventListener('click', () => {
      toggleBtn.classList.toggle('active');
      sidebar.classList.toggle('active');
    });
    document.body.appendChild(toggleBtn);
    
    window.addEventListener('scroll', () => {
      let currentHeading = null;
      const scrollPosition = window.scrollY + 100;
      
      for (const heading of headings) {
        const headingTop = heading.offsetTop;
        if (headingTop <= scrollPosition) {
          currentHeading = heading;
        } else {
          break;
        }
      }
      
      if (currentHeading) {
        document.querySelectorAll('.toc-list a').forEach(a => {
          a.classList.remove('active');
          if (a.getAttribute('href') === `#${currentHeading.id}`) {
            a.classList.add('active');
          }
        });
      }
    });
  }
  
  
  function initPhotoSwipe() {
    if (typeof PhotoSwipe === 'undefined') {
      console.warn('PhotoSwipe 未載入');
      return;
    }
    
    const links = document.querySelectorAll('a.gallery-link');
    if (!links.length) return;
    
    links.forEach((link, index) => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        
        const items = Array.from(links).map((l, i) => {
          const img = l.querySelector('img');
          
          let width = l.dataset.pswpWidth ? parseInt(l.dataset.pswpWidth) : 1200;
          let height = l.dataset.pswpHeight ? parseInt(l.dataset.pswpHeight) : 800;
          
          if (img && img.complete && img.naturalWidth) {
            width = img.naturalWidth;
            height = img.naturalHeight;
          }
          
          return {
            src: l.href,
            width: width,
            height: height,
            alt: img?.alt || `圖片 ${i + 1}`,
            thumbSrc: img?.src || ''
          };
        });
        
        const pswp = new PhotoSwipe({
          dataSource: items,
          index: index,
          bgOpacity: 0.9,
          closeOnVerticalDrag: true,
          closeOnBackgroundClick: true,
          arrowKeys: true,
          wheelToZoom: true,
          loop: true,
          padding: { top: 20, bottom: 20, left: 20, right: 20 },
        });
        
        pswp.init();
      });
    });
  }
})();
</script>
