<script>
document.addEventListener('DOMContentLoaded', function() {
  
  const modeBtns = document.querySelectorAll('.mode-btn');
  const switcher = document.querySelector('.reading-mode-switcher');
  
  if (!modeBtns.length || !switcher) return;
  
  
  const savedMode = localStorage.getItem('preferredReadingMode') || 'medium';
  
  
  document.body.classList.add(`reading-mode-${savedMode}`);
  
  
  modeBtns.forEach(btn => {
    if (btn.dataset.mode === savedMode) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
    
    
    btn.addEventListener('click', function() {
      const mode = this.dataset.mode;
      
      
      document.body.classList.remove('reading-mode-narrow', 'reading-mode-medium', 'reading-mode-wide');
      
      
      document.body.classList.add(`reading-mode-${mode}`);
      
      
      modeBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      
      
      localStorage.setItem('preferredReadingMode', mode);
      
      console.log(`閱讀模式切換為：${mode}`); 
    });
  });
});
</script>
