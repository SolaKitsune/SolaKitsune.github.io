baseURL = 'https://solakitsune.github.io/'
title = '熱月軌域環狀線~Fiery Luna Circular Line'
theme = 'hugo-book'

# 中文語言配置
languageCode = 'zh-CN'
defaultContentLanguage = 'zh'
defaultContentLanguageInSubdir = false

[params]
  BookTheme = 'auto'
  BookToC = true
  BookSection = 'docs'
  BookSearch = true

# 確保輸出的是 UTF-8
[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]
  
  [markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true