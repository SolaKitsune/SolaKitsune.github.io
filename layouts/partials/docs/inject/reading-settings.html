<!-- 閱讀設定面板 - 點擊齒輪開關 -->
<div class="settings-trigger">
  <span class="trigger-icon">⚙️</span>
  <div class="settings-panel">
    <div class="settings-group">
      <span class="settings-label">寬度</span>
      <button class="mode-btn" data-mode="narrow">窄</button>
      <button class="mode-btn active" data-mode="medium">中</button>
      <button class="mode-btn" data-mode="wide">寬</button>
    </div>
    <div class="settings-divider"></div>
    <div class="settings-group">
      <span class="settings-label">字體</span>
      <button class="font-btn" data-size="small">小</button>
      <button class="font-btn active" data-size="medium">中</button>
      <button class="font-btn" data-size="large">大</button>
    </div>
    
    <!-- 新增：繁簡切換區域 -->
    <div class="settings-divider"></div>
    <div class="settings-group">
      <span class="settings-label">語言</span>
      <button class="lang-btn" data-lang="zh-tw" title="繁體中文">繁</button>
      <button class="lang-btn" data-lang="zh-cn" title="簡體中文">簡</button>
    </div>
  </div>
</div>
